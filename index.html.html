<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPB Interactive Travel Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f0f2f5;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#header{background:linear-gradient(135deg,#1A2980,#26D0CE);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:600}
#header h1{font-size:clamp(12px,3.8vw,16px);font-weight:700;line-height:1.2}
#header p{font-size:clamp(9px,2.2vw,11px);opacity:.8;margin-top:1px}
#hamburger{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;display:none}

#layout{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;height:100%;z-index:1}

#panel{width:290px;background:#fff;border-left:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:400}

#panel-top{padding:10px 12px;border-bottom:1px solid #eee;flex-shrink:0}
.p-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
select.p-sel{width:100%;padding:8px 10px;border:1.5px solid #1A2980;border-radius:8px;font-size:13px;font-weight:700;color:#1A2980;background:#fff;cursor:pointer}
select.p-sel:focus{outline:none;box-shadow:0 0 0 3px rgba(26,41,128,.12)}
.frow{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.fb{padding:3px 9px;border-radius:14px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;background:#fff;white-space:nowrap}
.fb.on{color:#fff!important}
.fa{border-color:#666;color:#666}.fa.on{background:#666}
.fn{border-color:#27AE60;color:#27AE60}.fn.on{background:#27AE60}
.fm{border-color:#E67E22;color:#E67E22}.fm.on{background:#E67E22}
.ff{border-color:#E74C3C;color:#E74C3C}.ff.on{background:#E74C3C}
.fv{border-color:#8E44AD;color:#8E44AD}.fv.on{background:#8E44AD}

#patient-box{padding:8px 12px;border-bottom:1px solid #eee;flex-shrink:0}
.pat-row{display:flex;gap:6px}
.pat-row input{flex:1;padding:6px 9px;border:1.5px solid #ddd;border-radius:7px;font-size:12px;color:#333}
.pat-row input:focus{outline:none;border-color:#1A2980}
.pat-btn{background:#1A2980;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#pat-status{font-size:10px;color:#888;margin-top:4px;display:none}

#list-hdr{padding:6px 12px;background:#f8f9fa;border-bottom:1px solid #eee;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
#clinic-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.crow{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:.5px solid #f0f0f0;cursor:pointer}
.crow:active{background:#f0f4ff}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.7);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.cname{font-size:13px;font-weight:600;color:#222;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctag{font-size:11px;font-weight:700;color:#fff;padding:2px 7px;border-radius:10px;flex-shrink:0}

.leg{background:#fff;border-radius:9px;padding:9px 11px;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:10px;line-height:2}
.leg b{display:block;font-size:11px;color:#1A2980;margin-bottom:2px}
.lrow{display:flex;align-items:center;gap:5px;color:#333}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.lpop .leaflet-popup-content-wrapper{border-radius:12px;padding:0;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.18)}
.lpop .leaflet-popup-content{margin:0;min-width:230px;max-width:270px}
.ph{background:linear-gradient(135deg,#1A2980,#26D0CE);color:#fff;padding:9px 13px}
.ph-n{font-size:13px;font-weight:700}
.ph-a{font-size:10px;opacity:.8;margin-top:1px}
.pb{padding:9px 13px}
.ptag{display:inline-block;padding:3px 9px;border-radius:11px;font-size:12px;font-weight:700;color:#fff;margin-bottom:7px}
.pbrow{display:flex;gap:5px;margin-top:8px}
.pba{flex:1;padding:7px 4px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:3px;text-decoration:none}
.pba-g{background:#34A853;color:#fff}
.pba-r{background:#E67E22;color:#fff}

@media(max-width:600px){
  #panel{display:none}
  #hamburger{display:block}
  #sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -3px 20px rgba(0,0,0,.15);z-index:800;max-height:80dvh;display:flex;flex-direction:column;transform:translateY(calc(100% - 52px));transition:transform .32s cubic-bezier(.4,0,.2,1)}
  #sheet.up{transform:translateY(0)}
  #sheet-handle{padding:8px 0 4px;text-align:center;cursor:pointer;flex-shrink:0}
  #sheet-bar{width:34px;height:4px;background:#ddd;border-radius:2px;display:inline-block}
  #sheet-title{font-size:13px;font-weight:700;color:#1A2980;padding:0 0 6px}
  #sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 12px 20px;flex:1}
  .leaflet-bottom.leaflet-right{bottom:60px!important}
}
@media(min-width:601px){
  #sheet{display:none!important}
}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>&#127973; St. Paul Biddle (SPB) Interactive Travel Map</h1>
    <p>SPB &middot; 28 clinics across Maryland &middot; Tap a clinic to see travel times</p>
  </div>
  <button id="hamburger" onclick="sheetToggle()">&#9776; Clinics</button>
</div>

<div id="layout">
  <div id="map"></div>

  <div id="panel">
    <div id="panel-top">
      <div class="p-label">Starting clinic</div>
      <select class="p-sel" id="selD" onchange="pickClinic(this.value)">
        <option value="">&#8212; Select a clinic &#8212;</option>
      </select>
      <div class="frow">
        <button class="fb fa on" data-k="all">All</button>
        <button class="fb fn" data-k="near">&le;30 min</button>
        <button class="fb fm" data-k="mod">31&ndash;60</button>
        <button class="fb ff" data-k="far">61&ndash;90</button>
        <button class="fb fv" data-k="vfar">90+</button>
      </div>
    </div>
    <div id="patient-box">
      <div class="p-label">&#128100; Patient starting location</div>
      <div class="pat-row">
        <input id="pat-addr" type="text" placeholder="Address, city, or zip in MD" autocomplete="off" onkeydown="if(event.key==='Enter')patGo()"/>
        <button class="pat-btn" onclick="patGo()">Go</button>
      </div>
      <div id="pat-status"></div>
    </div>
    <div id="list-hdr">Select a clinic above</div>
    <div id="clinic-list"></div>
  </div>
</div>

<div id="sheet">
  <div id="sheet-handle" onclick="sheetToggle()">
    <div id="sheet-bar"></div>
    <div id="sheet-title">SPB Clinics</div>
  </div>
  <div id="sheet-body">
    <div style="margin-bottom:10px">
      <div class="p-label">Starting clinic</div>
      <select class="p-sel" id="selM" onchange="pickClinic(this.value);sheetClose()">
        <option value="">&#8212; Select a clinic &#8212;</option>
      </select>
    </div>
    <div style="margin-bottom:10px">
      <div class="p-label">&#128100; Patient starting location</div>
      <div class="pat-row">
        <input id="pat-addr-m" type="text" placeholder="Address, city, or zip in MD" autocomplete="off" onkeydown="if(event.key==='Enter')patGoM()"/>
        <button class="pat-btn" onclick="patGoM()">Go</button>
      </div>
      <div id="pat-status-m"></div>
    </div>
    <div class="frow" style="margin-bottom:10px">
      <button class="fb fa on" data-m="all">All</button>
      <button class="fb fn" data-m="near">&le;30</button>
      <button class="fb fm" data-m="mod">31&ndash;60</button>
      <button class="fb ff" data-m="far">61&ndash;90</button>
      <button class="fb fv" data-m="vfar">90+</button>
    </div>
    <div id="mobile-list"></div>
  </div>
</div>

function ms(m){if(m<60)return m+' min';const h=Math.floor(m/60),r=m%60;return r?h+'h '+r+'m':h+'h'}
function gc(m){return m<=30?'#27AE60':m<=60?'#E67E22':m<=90?'#E74C3C':'#8E44AD'}
function gcat(m){return m<=30?'near':m<=60?'mod':m<=90?'far':'vfar'}

const map=L.map('map',{center:[39.1,-76.8],zoom:9});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(map);

const leg=L.control({position:'bottomleft'});
leg.onAdd=()=>{const d=L.DomUtil.create('div','leg');d.innerHTML='<b>&#128336; Travel time</b><div class="lrow"><div class="ldot" style="background:#27AE60"></div>&le;30 min</div><div class="lrow"><div class="ldot" style="background:#E67E22"></div>31&ndash;60 min</div><div class="lrow"><div class="ldot" style="background:#E74C3C"></div>61&ndash;90 min</div><div class="lrow"><div class="ldot" style="background:#8E44AD"></div>90+ min</div><div class="lrow"><div class="ldot" style="background:#1A2980;border:2px solid #fff"></div>Selected</div>';return d;};
leg.addTo(map);

let MK={},LN=[],active=null,filt='all',patMk=null;

function icon(col,sz,sel){
  const s=sel?20:sz;
  return L.divIcon({className:'',html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${col};border:${sel?'3px solid #fff':'2px solid rgba(255,255,255,.75)'};box-shadow:${sel?`0 0 0 3px ${col},0 2px 8px rgba(0,0,0,.4)`:'0 1px 4px rgba(0,0,0,.25)'}"></div>`,iconSize:[s,s],iconAnchor:[s/2,s/2],popupAnchor:[0,-s/2]});
}
function originIcon(){
  return L.divIcon({className:'',html:`<div style="width:24px;height:24px;border-radius:50%;background:#1A2980;border:3px solid #fff;box-shadow:0 0 0 3px #1A2980,0 3px 10px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700">+</div>`,iconSize:[24,24],iconAnchor:[12,12],popupAnchor:[0,-12]});
}

Object.keys(C).sort().forEach(n=>{
  document.querySelectorAll('.p-sel').forEach(s=>{const o=document.createElement('option');o.value=n;o.textContent=n;s.appendChild(o);});
  const mk=L.marker([C[n].lat,C[n].lng],{icon:icon('#bbb',12,false)}).addTo(map);
  mk.on('click',()=>pickClinic(n));
  MK[n]=mk;
});

function clearLines(){LN.forEach(l=>map.removeLayer(l));LN=[];}

function pickClinic(name){
  if(!name)return;
  active=name;
  document.querySelectorAll('.p-sel').forEach(s=>s.value=name);
  clearLines();
  Object.keys(C).forEach(n=>{MK[n].setIcon(icon('#ccc',11,false));MK[n].setZIndexOffset(0);});
  MK[name].setIcon(originIcon());MK[name].setZIndexOffset(1000);
  const times=T[name]||{};
  const sorted=Object.entries(times).sort((a,b)=>a[1]-b[1]);
  sorted.forEach(([dest,mins])=>{
    if(!C[dest])return;
    const cat=gcat(mins),show=filt==='all'||filt===cat,col=gc(mins);
    if(show){
      MK[dest].setIcon(icon(col,16,false));MK[dest].setZIndexOffset(500);
      LN.push(L.polyline([[C[name].lat,C[name].lng],[C[dest].lat,C[dest].lng]],{color:col,weight:2,opacity:.4,dashArray:'5,7'}).addTo(map));
    }
    MK[dest].bindPopup(mkPopup(dest,name,mins,sorted),{maxWidth:280,className:'lpop'});
  });
  const top5=sorted.slice(0,5).map(([d,m])=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:.5px solid #f0f0f0"><span style="font-size:11px">${d}</span><span style="font-size:11px;font-weight:700;color:${gc(m)}">${ms(m)}</span></div>`).join('');
  MK[name].bindPopup(`<div class="ph"><div class="ph-n">&#128205; ${name}</div><div class="ph-a">${C[name].addr}</div></div><div class="pb"><div style="font-size:10px;font-weight:700;color:#555;margin-bottom:5px">5 nearest clinics</div>${top5}<div style="font-size:10px;color:#bbb;margin-top:6px">Tap any marker for full details</div></div>`,{maxWidth:270,className:'lpop'}).openPopup();
  buildList(name,sorted);
}

function mkPopup(dest,origin,mins,sorted){
  const col=gc(mins);
  const gurl=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(C[dest].addr)}&travelmode=driving`;
  const nearby=sorted.filter(([d])=>d!==dest).slice(0,4).map(([d,m])=>`<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:.5px solid #f0f0f0"><span style="font-size:11px">${d}</span><span style="font-size:11px;font-weight:700;color:${gc(m)}">${ms(m)}</span></div>`).join('');
  return `<div class="ph"><div class="ph-n">&#127973; ${dest}</div><div class="ph-a">${C[dest].addr}</div></div><div class="pb"><span class="ptag" style="background:${col}">&#128336; ${ms(mins)} from ${origin}</span><div style="font-size:10px;color:#999;margin-bottom:5px">Other clinics from ${origin}:</div>${nearby}<div class="pbrow"><a href="${gurl}" target="_blank" class="pba pba-g">&#128205; Open in Google Maps</a><button class="pba pba-r" onclick="patFromClinic('${dest}')">&#128100; Patient here</button></div></div>`;
}

window.patFromClinic=function(clinicName){
  const addr=C[clinicName].addr;
  document.querySelectorAll('#pat-addr,#pat-addr-m').forEach(el=>el.value=addr);
  runPatient(addr);
};

function buildList(name,sorted){
  document.getElementById('list-hdr').textContent=`From ${name} — ${sorted.length} destinations`;
  const html=sorted.map(([dest,mins])=>{
    const cat=gcat(mins),show=filt==='all'||filt===cat;
    if(!show)return '';
    const col=gc(mins);
    return `<div class="crow" onclick="focusMk('${dest}')"><div class="cdot" style="background:${col}"></div><div class="cname">${dest}</div><span class="ctag" style="background:${col}">${ms(mins)}</span></div>`;
  }).join('');
  document.getElementById('clinic-list').innerHTML=html||'<div style="padding:14px;color:#bbb;font-size:12px;text-align:center">No clinics match filter</div>';
  document.getElementById('mobile-list').innerHTML=html||'<div style="padding:14px;color:#bbb;font-size:12px;text-align:center">No clinics match filter</div>';
}

window.focusMk=function(n){map.setView([C[n].lat,C[n].lng],13);MK[n].openPopup();sheetClose();};

function applyFilter(f){
  filt=f;
  document.querySelectorAll('.fb[data-k]').forEach(b=>{b.classList.toggle('on',b.dataset.k===f);});
  document.querySelectorAll('.fb[data-m]').forEach(b=>{b.classList.toggle('on',b.dataset.m===f);});
  if(active){const times=T[active]||{};buildList(active,Object.entries(times).sort((a,b)=>a[1]-b[1]));clearLines();reDrawLines();}
}

function reDrawLines(){
  if(!active)return;
  const times=T[active]||{};
  Object.entries(times).forEach(([dest,mins])=>{
    if(!C[dest])return;
    const cat=gcat(mins),show=filt==='all'||filt===cat,col=gc(mins);
    if(show){
      MK[dest].setIcon(icon(col,16,false));MK[dest].setZIndexOffset(500);
      LN.push(L.polyline([[C[active].lat,C[active].lng],[C[dest].lat,C[dest].lng]],{color:col,weight:2,opacity:.4,dashArray:'5,7'}).addTo(map));
    } else {
      MK[dest].setIcon(icon('#ccc',11,false));MK[dest].setZIndexOffset(0);
    }
  });
}

document.querySelectorAll('.fb[data-k]').forEach(b=>b.addEventListener('click',()=>applyFilter(b.dataset.k)));
document.querySelectorAll('.fb[data-m]').forEach(b=>b.addEventListener('click',()=>applyFilter(b.dataset.m)));

async function runPatient(rawAddr){
  const statusEls=[document.getElementById('pat-status'),document.getElementById('pat-status-m')];
  statusEls.forEach(el=>{el.style.display='block';el.innerHTML='<span style="color:#888">Searching for address...</span>';});
  try{
    const geo=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(rawAddr+', Maryland')}&format=json&limit=1&countrycodes=us`,{headers:{'Accept-Language':'en'}});
    const gd=await geo.json();
    if(!gd.length){statusEls.forEach(el=>el.innerHTML='<span style="color:#c0392b">Address not found. Try adding a zip code.</span>');return;}
    const {lat,lon,display_name}=gd[0];
    const oLat=parseFloat(lat),oLng=parseFloat(lon);
    statusEls.forEach(el=>el.innerHTML='<span style="color:#27AE60">&#10003; Found. Calculating distances...</span>');
    const results=[];
    await Promise.allSettled(Object.entries(C).map(async([nm,cd])=>{
      try{
        const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${oLng},${oLat};${cd.lng},${cd.lat}?overview=false`,{signal:AbortSignal.timeout(5000)});
        const d=await r.json();
        if(d.routes&&d.routes[0])results.push({name:nm,mins:Math.round(d.routes[0].duration/60)});
        else throw new Error();
      }catch{
        const dist=Math.sqrt(Math.pow(oLat-cd.lat,2)+Math.pow(oLng-cd.lng,2));
        results.push({name:nm,mins:Math.round(dist*80)});
      }
    }));
    results.sort((a,b)=>a.mins-b.mins);
    const rows=results.slice(0,8).map(r=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid #f0f0f0"><span style="font-size:11px">${r.name}</span><span style="font-size:11px;font-weight:700;color:${gc(r.mins)}">${ms(r.mins)}</span></div>`).join('');
    statusEls.forEach(el=>el.innerHTML=`<div style="font-size:10px;font-weight:700;color:#1A2980;margin:4px 0 2px">Nearest 8 clinics:</div>${rows}`);
    if(patMk)map.removeLayer(patMk);
    patMk=L.marker([oLat,oLng],{icon:L.divIcon({className:'',html:`<div style="background:#E74C3C;color:#fff;border-radius:16px;padding:4px 8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">Patient</div>`,iconSize:[70,26],iconAnchor:[35,13]})}).addTo(map)
      .bindPopup(`<div class="ph"><div class="ph-n">&#128100; Patient location</div><div class="ph-a">${display_name.split(',').slice(0,3).join(',')}</div></div><div class="pb"><b>Nearest clinic:</b> ${results[0].name} &mdash; ${ms(results[0].mins)}</div>`,{className:'lpop'}).openPopup();
    map.setView([oLat,oLng],10);
  }catch(e){statusEls.forEach(el=>el.innerHTML='<span style="color:#c0392b">Could not find address. Try again.</span>');}
}

window.patGo=function(){const v=document.getElementById('pat-addr').value.trim();if(v)runPatient(v);};
window.patGoM=function(){const v=document.getElementById('pat-addr-m').value.trim();if(v)runPatient(v);};
['pat-addr','pat-addr-m'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();id==='pat-addr'?patGo():patGoM();}}));

let sheetOpen=false;
window.sheetToggle=function(){sheetOpen=!sheetOpen;document.getElementById('sheet').classList.toggle('up',sheetOpen);};
window.sheetClose=function(){sheetOpen=false;document.getElementById('sheet').classList.remove('up');};
map.on('click',()=>{if(sheetOpen)sheetClose();});
</script>
